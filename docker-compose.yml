services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://synthhive:synthhive@synthcore-postgres-1:5432/synthhive
      - REDIS_URL=redis://synthcore-redis-1:6379/1
    volumes:
      - .:/app
    networks:
      - default
      - synth
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py seed &&
             uv run python manage.py collectstatic --noinput &&
             uv run daphne -b 0.0.0.0 -p 7177 synthhive.asgi:application"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      - DATABASE_URL=postgresql://synthhive:synthhive@synthcore-postgres-1:5432/synthhive
      - REDIS_URL=redis://synthcore-redis-1:6379/1
    volumes:
      - .:/app
    networks:
      - default
      - synth
    command: uv run python manage.py runbot

  frontend-build:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "bun install --frozen-lockfile && bun run build"
    restart: "no"

  caddy:
    image: caddy:2
    container_name: synthhive-caddy
    restart: unless-stopped
    depends_on:
      - server
      - frontend-build
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "7177:80"
    networks:
      - default
      - synth

networks:
  default:
  synth:
    external: true

volumes:
  frontend_dist:
  caddy_data:
  caddy_config:

